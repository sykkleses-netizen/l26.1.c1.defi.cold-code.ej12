<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empleado - Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div id="app-bootstrap" class="container mt-5">
    <h2>Gestión de Empleados (Bootstrap)</h2>
    <button type="button" class="btn btn-primary" id="body_btNuevoEmpleado">Nuevo empleado</button>
    <hr>
  <div class="alert alert-info shadow-sm">
    <div class="mb-2">
      Porcentaje de mujeres: <span id="body_lblPorcenMujeres" class="fw-bold">0</span>%
    </div>
    <div class="mb-2">
      Porcentaje de hombres: <span id="body_lblPorcenHombres" class="fw-bold">0</span>%
    </div>
    <div class="mb-2">
      Total de hombres: <span id="body_lblTotalHombres" class="fw-bold">0</span>
    </div>
  <div class="modal fade" id="empleado" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Procesar Empleado</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Nombre:</label>
            <input type="text" class="form-control" id="empleado_inNombre">
          </div>
          <div class="mb-3">
            <label class="form-label">Sexo (F/M):</label>
            <input type="text" class="form-control" id="empleado_inSexo" maxlength="1">
          </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="empleado_btCancelar" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-success" id="empleado_btAceptar">Aceptar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
    import Cl_cEmpresa from "./dist/controllers/Cl_cEmpresa.js";
    import Cl_cEmpleado from "./dist/controllers/Cl_cEmpleado.js";
    import Cl_vEmpresaBootstrap from "./dist/views/Cl_vEmpresaBootstrap.js";
    import Cl_vEmpleadoBootstrap from "./dist/views/Cl_vEmpleadoBootstrap.js";

    const vistaEmpresa = new Cl_vEmpresaBootstrap();
    const vistaEmpleado = new Cl_vEmpleadoBootstrap();

    const controladorEmpleado = new Cl_cEmpleado(vistaEmpleado);
    new Cl_cEmpresa(vistaEmpresa, controladorEmpleado);
  </script>
</body>
</html>
